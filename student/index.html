<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ExamSetu — Student</title>
<meta name="theme-color" content="#1E3A8A">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root{
  --pri:#1E3A8A; --pri-d:#1E293B; --acc:#F59E0B;
  --g1:#F1F5F9; --g2:#E2E8F0; --g4:#94A3B8; --g5:#64748B; --g7:#334155; --g9:#0F172A;
  --ok:#059669; --bad:#DC2626; --bg:#F8FAFC;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--g9)}
.screen{min-height:100vh;display:none;flex-direction:column}
.screen.on{display:flex}
.topbar{background:var(--pri);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.topbar h1{font-size:17px;margin:0;font-weight:700;flex:1}
.topbar button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.wrap{padding:16px;max-width:640px;margin:0 auto;width:100%;flex:1}

/* ── Login ── */
#screen-login .wrap{display:flex;flex-direction:column;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:18px;padding:28px 24px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:18px}
.login-logo .ic{font-size:44px}
.login-logo .nm{font-size:22px;font-weight:800;color:var(--pri);margin-top:4px}
.login-logo .sub{font-size:12px;color:var(--g5)}
.fi{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:15px;margin-bottom:12px;background:#fff}
.fi:focus{outline:none;border-color:var(--pri)}
.btn-main{width:100%;padding:13px;border:none;border-radius:10px;background:var(--pri);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-main:active{opacity:.85}
.login-err{color:var(--bad);font-size:13px;margin-bottom:10px;display:none;background:#FEF2F2;padding:9px 12px;border-radius:8px}

/* ── Test list ── */
.test-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid var(--g1)}
.test-card .ttl{font-size:15px;font-weight:700;color:var(--g9);margin-bottom:6px}
.test-card .meta{font-size:12px;color:var(--g5);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.test-card .meta span{display:flex;align-items:center;gap:3px}
.badge-done{background:#ECFDF5;color:var(--ok);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:10px}
.empty{text-align:center;padding:60px 20px;color:var(--g5)}
.empty .ic{font-size:44px;margin-bottom:10px}
.tabs{display:flex;gap:6px;padding:0 16px;margin-top:10px}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:13px;font-weight:600;background:#fff;border:1px solid var(--g2);color:var(--g5);cursor:pointer}
.tab.on{background:var(--pri);color:#fff;border-color:var(--pri)}

/* ── Test taking ── */
#screen-test .topbar{background:var(--pri-d)}
.timer{background:rgba(255,255,255,.15);padding:6px 12px;border-radius:8px;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.timer.low{background:var(--bad)}
.qnav{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--g1)}
.qnav-btn{min-width:34px;height:34px;border-radius:8px;border:1px solid var(--g2);background:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;color:var(--g7)}
.qnav-btn.answered{background:var(--ok);color:#fff;border-color:var(--ok)}
.qnav-btn.current{outline:2px solid var(--acc);outline-offset:1px}
.q-card{background:#fff;border-radius:14px;padding:18px;margin:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-num-badge{display:inline-block;background:var(--g1);color:var(--g7);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.q-text{font-size:15px;line-height:1.6;color:var(--g9);margin-bottom:16px}
.opt-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1.5px solid var(--g2);border-radius:10px;margin-bottom:9px;cursor:pointer}
.opt-row.sel{border-color:var(--pri);background:#EFF6FF}
.opt-letter{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--g4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--g5)}
.opt-row.sel .opt-letter{background:var(--pri);border-color:var(--pri);color:#fff}
.opt-text{font-size:14px;line-height:1.5;padding-top:2px}
.num-input{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:16px}
.subq-block{border-top:1px dashed var(--g2);margin-top:16px;padding-top:16px}
.passage-box{background:var(--g1);padding:14px;border-radius:10px;font-size:14px;line-height:1.6;margin-bottom:16px}
.matrix-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:13px}
.matrix-tbl td,.matrix-tbl th{border:1px solid var(--g2);padding:8px;text-align:left}
.foot-nav{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--g1);padding:12px 16px;display:flex;gap:10px}
.foot-nav button{flex:1;padding:12px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer}
.btn-prev{background:var(--g1);color:var(--g7)}
.btn-next{background:var(--pri);color:#fff}
.btn-submit{background:var(--ok);color:#fff}

/* ── Result ── */
.score-hero{background:linear-gradient(135deg,var(--pri),#3B5FC4);color:#fff;border-radius:16px;padding:26px;text-align:center;margin-bottom:16px}
.score-hero .big{font-size:40px;font-weight:800}
.score-hero .lbl{font-size:13px;opacity:.85;margin-top:4px}
.review-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--g2)}
.review-item.correct{border-left-color:var(--ok)}
.review-item.wrong{border-left-color:var(--bad)}
.review-item.skip{border-left-color:var(--g4)}
.review-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.review-tag.correct{background:#ECFDF5;color:var(--ok)}
.review-tag.wrong{background:#FEF2F2;color:var(--bad)}
.review-tag.skip{background:var(--g1);color:var(--g5)}
.sol-box{background:#FFFBEB;border-left:3px solid var(--acc);padding:9px 12px;border-radius:6px;font-size:13px;margin-top:8px;color:var(--g7)}

/* ── Results history ── */
.result-row{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.result-row .ttl{font-size:14px;font-weight:700}
.result-row .dt{font-size:11px;color:var(--g4);margin-top:2px}
.result-row .sc{font-size:16px;font-weight:800;color:var(--pri)}

.loading{text-align:center;padding:60px 20px;color:var(--g5)}
.spin{width:32px;height:32px;border:3px solid var(--g2);border-top-color:var(--pri);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--g9);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:.25s;pointer-events:none}
.toast.on{opacity:1;bottom:30px}
.katex-display{overflow-x:auto;margin:.4em 0}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="screen-login" class="screen on">
  <div class="wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="ic">🎓</div>
        <div class="nm">ExamSetu</div>
        <div class="sub">Student Login</div>
      </div>
      <div class="login-err" id="login-err"></div>
      <input class="fi" id="li-user" placeholder="Username / Roll No" autocomplete="username">
      <input class="fi" id="li-pass" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn-main" id="li-btn" onclick="doStudentLogin()">Log In</button>
      <div style="text-align:center;font-size:12px;color:var(--g4);margin-top:14px">
        Don't have an account? Ask your teacher/admin to create one for you.
      </div>
    </div>
  </div>
</div>

<!-- ══════════ HOME (test list) ══════════ -->
<div id="screen-home" class="screen">
  <div class="topbar">
    <h1 id="home-greeting">Hi 👋</h1>
    <button onclick="showResultsHistory()">📊 Results</button>
    <button onclick="studentLogout()">⏻</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-pending" onclick="setTestTab('pending')">📝 To Attempt</div>
    <div class="tab" id="tab-done" onclick="setTestTab('done')">✅ Completed</div>
  </div>
  <div class="wrap" id="test-list-wrap">
    <div class="loading"><div class="spin"></div>Loading tests…</div>
  </div>
</div>

<!-- ══════════ TEST TAKING ══════════ -->
<div id="screen-test" class="screen">
  <div class="topbar">
    <h1 id="test-title" style="font-size:14px">Test</h1>
    <div class="timer" id="test-timer">--:--</div>
  </div>
  <div class="qnav" id="qnav"></div>
  <div id="q-container" style="flex:1"></div>
  <div class="foot-nav">
    <button class="btn-prev" onclick="navQ(-1)">← Prev</button>
    <button class="btn-next" id="next-btn" onclick="navQ(1)">Next →</button>
  </div>
</div>

<!-- ══════════ RESULT ══════════ -->
<div id="screen-result" class="screen">
  <div class="topbar">
    <h1>Result</h1>
    <button onclick="goHome()">🏠 Home</button>
  </div>
  <div class="wrap" id="result-wrap"></div>
</div>

<!-- ══════════ RESULTS HISTORY ══════════ -->
<div id="screen-history" class="screen">
  <div class="topbar">
    <button onclick="goHome()" style="margin-right:4px">←</button>
    <h1>My Results</h1>
  </div>
  <div class="wrap" id="history-wrap">
    <div class="loading"><div class="spin"></div>Loading…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════ CONFIG ═══════════════════════
// Set this to your deployed backend URL (same one used in the admin app's
// "Backend Settings"). Example: 'https://examsetu-backend.onrender.com'
// Can also be overridden at runtime via ?backend=https://... (saved for future visits).
const _urlParams = new URLSearchParams(window.location.search);
const _backendOverride = _urlParams.get('backend');
if(_backendOverride) localStorage.setItem('es_backend_url', _backendOverride);
const BACKEND_URL = localStorage.getItem('es_backend_url') || 'PASTE_YOUR_RENDER_BACKEND_URL_HERE';

// ═══════════════════════ STATE ═══════════════════════
let token = localStorage.getItem('es_student_token') || '';
let studentInfo = JSON.parse(localStorage.getItem('es_student_info') || 'null');
let allTests = [];
let testTab = 'pending';
let curTest = null;        // full test detail incl. questions
let curAnswers = {};       // {questionId or 'qid::subN': value}
let curQIndex = 0;
let flatQuestions = [];    // flattened list: {q, subIdx?, displayNum}
let timerSecs = 0;
let timerIv = null;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('on'), 2500);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Simplified rich-text renderer: KaTeX for $...$/$$...$$, [IMG:key] -> <img>, plain fallback tags.
function rltx(text, imgs){
  if(!text) return '';
  imgs = imgs || {};
  const DOC_HTML = {'[EQ]':'∫ equation','[IMG]':'🖼 figure','[Diagram]':'📐 Diagram','[CHEM]':'⚗ structure','[OBJ]':'·object·'};
  const TOKEN_RE = /\[EQ\]|\[IMG\]|\[Diagram\]|\[CHEM\]|\[OBJ\]|\[IMG:([^\]]+)\]|\$\$[\s\S]*?\$\$|\$[^$\n]+?\$/g;
  let result = '', last = 0, tm;
  while((tm = TOKEN_RE.exec(text)) !== null){
    if(tm.index > last) result += esc(text.slice(last, tm.index));
    const tok = tm[0];
    if(DOC_HTML[tok]){
      result += `<span style="color:#94A3B8">${DOC_HTML[tok]}</span>`;
    } else if(tok.startsWith('[IMG:')){
      const url = imgs[tm[1]];
      result += url ? `<img src="${url}" style="max-width:100%;max-height:220px;border-radius:8px;margin:6px 0;display:block;border:1px solid #eee">` : '<span style="color:#94A3B8">📐 Diagram</span>';
    } else {
      const dp = tok.startsWith('$$');
      const ltx = dp ? tok.slice(2,-2) : tok.slice(1,-1);
      try{ result += katex.renderToString(ltx.trim(), {displayMode:dp, throwOnError:false, output:'html'}); }
      catch(e){ result += esc(tok); }
    }
    last = tm.index + tok.length;
  }
  if(last < text.length) result += esc(text.slice(last));
  return result;
}
// solution can be a single string (doc-imported) or an array of step strings (manually authored)
function renderSolution(sol, imgs){
  if(!sol) return '';
  const steps = Array.isArray(sol) ? sol.filter(Boolean) : [sol];
  if(!steps.length) return '';
  return steps.map(s=>rltx(s, imgs)).join('<br>');
}

async function api(path, opts={}){
  if(!BACKEND_URL || BACKEND_URL.includes('PASTE_YOUR')){
    toast('⚠️ App not configured — backend URL missing');
    throw new Error('Backend URL not configured');
  }
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  const resp = await fetch(BACKEND_URL.replace(/\/$/,'') + path, {...opts, headers});
  let body; try{ body = await resp.json(); }catch(e){ body = {}; }
  if(resp.status === 401){ studentLogout(); throw new Error('Session expired — please log in again'); }
  if(!resp.ok) throw new Error(body.error || ('Request failed: '+resp.status));
  return body;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ═══════════════════════ AUTH ═══════════════════════
async function doStudentLogin(){
  const username = document.getElementById('li-user').value.trim();
  const password = document.getElementById('li-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if(!username || !password){ errEl.textContent = 'Enter username and password'; errEl.style.display='block'; return; }
  const btn = document.getElementById('li-btn');
  btn.textContent = 'Logging in…'; btn.disabled = true;
  try{
    const res = await api('/api/auth/login', {method:'POST', body: JSON.stringify({username, password})});
    token = res.token; studentInfo = res.student;
    localStorage.setItem('es_student_token', token);
    localStorage.setItem('es_student_info', JSON.stringify(studentInfo));
    goHome();
  }catch(e){
    errEl.textContent = e.message === 'Invalid username or password' ? '❌ Invalid username or password' : '❌ ' + e.message;
    errEl.style.display = 'block';
  }finally{
    btn.textContent = 'Log In'; btn.disabled = false;
  }
}
function studentLogout(){
  token=''; studentInfo=null;
  localStorage.removeItem('es_student_token'); localStorage.removeItem('es_student_info');
  document.getElementById('li-user').value=''; document.getElementById('li-pass').value='';
  showScreen('screen-login');
}

// ═══════════════════════ HOME / TEST LIST ═══════════════════════
async function goHome(){
  if(!token){ showScreen('screen-login'); return; }
  showScreen('screen-home');
  document.getElementById('home-greeting').textContent = `Hi, ${(studentInfo?.name||'Student').split(' ')[0]} 👋`;
  await loadTests();
}
async function loadTests(){
  const wrap = document.getElementById('test-list-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spin"></div>Loading tests…</div>';
  try{
    allTests = await api('/api/student/tests');
    renderTestList();
  }catch(e){
    wrap.innerHTML = `<div class="empty"><div class="ic">⚠️</div>${esc(e.message)}</div>`;
  }
}
function setTestTab(t){
  testTab = t;
  document.getElementById('tab-pending').classList.toggle('on', t==='pending');
  document.getElementById('tab-done').classList.toggle('on', t==='done');
  renderTestList();
}
function renderTestList(){
  const wrap = document.getElementById('test-list-wrap');
  const list = allTests.filter(t => testTab==='pending' ? !t.attempted : t.attempted);
  if(!list.length){
    wrap.innerHTML = `<div class="empty"><div class="ic">${testTab==='pending'?'📭':'🗂'}</div>${testTab==='pending'?'No new tests right now.<br>Check back after your teacher publishes one.':'You have not completed any tests yet.'}</div>`;
    return;
  }
  wrap.innerHTML = list.map(t => `
    <div class="test-card">
      ${t.attempted ? '<div class="badge-done">✅ Completed</div>' : ''}
      <div class="ttl">${esc(t.title)}</div>
      <div class="meta">
        <span>📘 ${esc(t.board||'General')}</span>
        <span>⏱ ${t.dur} min</span>
        <span>🎯 ${t.mks} marks</span>
      </div>
      ${t.attempted
        ? `<button class="btn-main" style="background:var(--g1);color:var(--g7)" onclick="toast('Check My Results for your score')">View in Results</button>`
        : `<button class="btn-main" onclick="startTest('${t.id}')">Start Test →</button>`}
    </div>`).join('');
}

// ═══════════════════════ TEST TAKING ═══════════════════════
async function startTest(testId){
  toast('Loading test…');
  try{
    curTest = await api('/api/student/tests/'+testId);
  }catch(e){ toast('❌ '+e.message); return; }

  if(!confirm(`Start "${curTest.title}"?\n\nDuration: ${curTest.dur} minutes\nOnce started, the timer won't pause. You can submit anytime.`)) return;

  curAnswers = {};
  flatQuestions = [];
  (curTest.questions||[]).forEach(q=>{
    if(q.type === 'PARAGRAPH'){
      const subQs = (q.opts && q.opts.subQs) || [];
      subQs.forEach((sq,i)=> flatQuestions.push({ q, subQ: sq, isSub:true, passage:q.opts.passage, imgs:q.imgs }));
    } else {
      flatQuestions.push({ q, isSub:false });
    }
  });
  curQIndex = 0;
  timerSecs = (curTest.dur||60) * 60;
  document.getElementById('test-title').textContent = curTest.title;
  showScreen('screen-test');
  renderQNav();
  renderCurrentQ();
  clearInterval(timerIv);
  timerIv = setInterval(tickTimer, 1000);
}

function tickTimer(){
  timerSecs--;
  const el = document.getElementById('test-timer');
  if(timerSecs <= 0){
    clearInterval(timerIv);
    el.textContent = '00:00';
    toast('⏰ Time up! Submitting…');
    submitTest(true);
    return;
  }
  const m = Math.floor(timerSecs/60), s = timerSecs%60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('low', timerSecs < 60);
}

function ansKeyFor(item){
  return item.isSub ? `${item.q.id}::${item.subQ.n}` : item.q.id;
}

function renderQNav(){
  const nav = document.getElementById('qnav');
  nav.innerHTML = flatQuestions.map((item,i)=>{
    const key = ansKeyFor(item);
    const answered = curAnswers[key] !== undefined && curAnswers[key] !== '' &&
      !(Array.isArray(curAnswers[key]) && curAnswers[key].length===0) &&
      !(typeof curAnswers[key]==='object' && curAnswers[key]!==null && !Array.isArray(curAnswers[key]) && Object.keys(curAnswers[key]).length===0);
    return `<button class="qnav-btn ${answered?'answered':''} ${i===curQIndex?'current':''}" onclick="jumpQ(${i})">${i+1}</button>`;
  }).join('');
}
function jumpQ(i){ curQIndex = i; renderCurrentQ(); renderQNav(); }
function navQ(dir){
  if(dir>0 && curQIndex === flatQuestions.length-1){ submitTest(false); return; }
  curQIndex = Math.max(0, Math.min(flatQuestions.length-1, curQIndex+dir));
  renderCurrentQ(); renderQNav();
}

function renderCurrentQ(){
  const item = flatQuestions[curQIndex];
  const c = document.getElementById('q-container');
  const key = ansKeyFor(item);
  const given = curAnswers[key];
  const q = item.isSub ? item.subQ : item.q;
  const imgs = item.q.imgs || {};
  const marks = item.q.marks, neg = item.q.neg;

  let inner = `<div class="q-card">`;
  inner += `<div class="q-num-badge">Question ${curQIndex+1} of ${flatQuestions.length} · +${marks} / ${neg}</div>`;
  if(item.isSub && item.passage){
    inner += `<div class="passage-box"><strong>Passage:</strong><br>${rltx(item.passage, imgs)}</div>`;
  }
  inner += `<div class="q-text">${rltx(q.text, imgs)}</div>`;

  if(q.type === 'SMCQ' || q.type === 'MATCH LIST'){
    const opts = q.opts || {};
    const letters = q.type==='MATCH LIST' ? ['A','B','C','D'].filter(l=>opts[l]) : Object.keys(opts).filter(k=>opts[k]!==undefined && k.length<=2);
    if(q.type === 'MATCH LIST' && item.q.opts && item.q.opts.list1){
      inner += renderMatchListTables(item.q.opts, imgs);
    }
    inner += letters.map(l => `
      <div class="opt-row ${given===l?'sel':''}" onclick="selectSingle('${key}','${l}')">
        <div class="opt-letter">${l}</div>
        <div class="opt-text">${rltx(opts[l], imgs)}</div>
      </div>`).join('');
  } else if(q.type === 'MMCQ'){
    const opts = q.opts || {};
    const letters = Object.keys(opts).filter(k=>opts[k]!==undefined && k.length<=2);
    const arr = Array.isArray(given) ? given : [];
    inner += letters.map(l => `
      <div class="opt-row ${arr.includes(l)?'sel':''}" onclick="toggleMulti('${key}','${l}')">
        <div class="opt-letter">${arr.includes(l)?'✓':l}</div>
        <div class="opt-text">${rltx(opts[l], imgs)}</div>
      </div>`).join('');
  } else if(q.type === 'INTEGER' || q.type === 'NUMERICAL'){
    inner += `<input class="num-input" type="${q.type==='INTEGER'?'number' : 'text'}" inputmode="decimal"
      placeholder="Enter your answer" value="${given!=null?given:''}"
      oninput="setNumAnswer('${key}', this.value, '${q.type}')">`;
  } else if(q.type === 'MATRIX MATCH'){
    inner += renderMatrixMatch(item.q.opts||{}, key, given||{}, imgs);
  } else {
    inner += `<div style="color:var(--g4);font-size:13px">This question type isn't supported in the app yet — please contact your teacher.</div>`;
  }
  inner += `</div>`;
  c.innerHTML = inner;

  document.getElementById('next-btn').textContent = curQIndex === flatQuestions.length-1 ? '✅ Submit Test' : 'Next →';
  document.getElementById('next-btn').className = curQIndex === flatQuestions.length-1 ? 'btn-submit' : 'btn-next';
}

function renderMatchListTables(opts, imgs){
  const keys1 = opts.keys1 || Object.keys(opts.list1||{});
  const keys2 = opts.keys2 || Object.keys(opts.list2||{});
  return `<table class="matrix-tbl"><tr><th>List I</th><th>List II</th></tr>
    ${keys1.map((k,i)=>`<tr><td>${k}. ${rltx(opts.list1[k],imgs)}</td><td>${keys2[i]?keys2[i]+'. '+rltx(opts.list2[keys2[i]],imgs):''}</td></tr>`).join('')}
  </table>`;
}
function renderMatrixMatch(opts, key, given, imgs){
  const keysA = opts.keysA || Object.keys(opts.colA||{});
  const keysB = opts.keysB || Object.keys(opts.colB||{});
  let html = `<table class="matrix-tbl"><tr><th>Column A</th><th>Your Match (Column B)</th></tr>`;
  keysA.forEach(a=>{
    html += `<tr><td>${a}. ${rltx(opts.colA[a], imgs)}</td><td>
      <select onchange="setMatrixAnswer('${key}','${a}',this.value)" style="padding:6px;border-radius:6px;border:1px solid var(--g2)">
        <option value="">— pick —</option>
        ${keysB.map(b=>`<option value="${b}" ${given[a]===b?'selected':''}>${b}. ${(opts.colB[b]||'').replace(/<[^>]+>/g,'').substring(0,30)}</option>`).join('')}
      </select></td></tr>`;
  });
  html += `</table>`;
  return html;
}

function selectSingle(key, val){ curAnswers[key] = val; renderQNav(); renderCurrentQ(); }
function toggleMulti(key, letter){
  const arr = Array.isArray(curAnswers[key]) ? [...curAnswers[key]] : [];
  const idx = arr.indexOf(letter);
  if(idx>=0) arr.splice(idx,1); else arr.push(letter);
  curAnswers[key] = arr;
  renderQNav(); renderCurrentQ();
}
function setNumAnswer(key, val, type){
  curAnswers[key] = val === '' ? '' : (type==='INTEGER' ? val : val);
  renderQNav();
}
function setMatrixAnswer(key, aKey, bVal){
  const obj = (typeof curAnswers[key]==='object' && curAnswers[key]) ? {...curAnswers[key]} : {};
  if(bVal) obj[aKey] = bVal; else delete obj[aKey];
  curAnswers[key] = obj;
  renderQNav();
}

async function submitTest(auto){
  if(!auto && !confirm('Submit the test now? You cannot change answers after submitting.')) return;
  clearInterval(timerIv);
  toast('Submitting…');
  try{
    const res = await api(`/api/student/tests/${curTest.id}/submit`, {
      method:'POST',
      body: JSON.stringify({ answers: curAnswers, startedAt: Date.now() - ((curTest.dur*60 - timerSecs)*1000) }),
    });
    showResult(res);
    await loadTests(); // refresh so it moves to "Completed" tab
  }catch(e){
    toast('❌ '+e.message);
    if(e.message === 'Already submitted'){ goHome(); }
  }
}

function showResult(res){
  showScreen('screen-result');
  const pct = res.maxScore ? Math.round((res.score/res.maxScore)*100) : 0;
  const byId = {};
  (curTest.questions||[]).forEach(q=>byId[q.id]=q);

  let html = `<div class="score-hero">
    <div class="big">${res.score} / ${res.maxScore}</div>
    <div class="lbl">${pct}% Score</div>
  </div>`;

  html += res.review.map((r,i)=>{
    const cls = r.given==null || r.given==='' || (Array.isArray(r.given)&&r.given.length===0) ? 'skip' : (r.isCorrect ? 'correct' : 'wrong');
    const tag = cls==='skip' ? 'Not Attempted' : (cls==='correct' ? '✅ Correct' : '❌ Wrong');
    const givenStr = Array.isArray(r.given) ? r.given.join(', ') : (typeof r.given==='object' && r.given ? JSON.stringify(r.given) : (r.given ?? '—'));
    const corrStr = Array.isArray(r.correct) ? r.correct.join(', ') : (typeof r.correct==='object' && r.correct ? JSON.stringify(r.correct) : r.correct);
    const parentId = String(r.id).includes('::') ? String(r.id).split('::')[0] : r.id;
    const imgs = (byId[parentId]||{}).imgs || {};
    return `<div class="review-item ${cls}">
      <span class="review-tag ${cls}">${tag}</span>
      <div style="font-size:13px;margin:4px 0"><strong>Your answer:</strong> ${esc(String(givenStr))} &nbsp; <strong>Correct:</strong> ${esc(String(corrStr))}</div>
      ${r.solution ? `<div class="sol-box"><strong>Solution:</strong> ${renderSolution(r.solution, imgs)}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('result-wrap').innerHTML = html;
}

// ═══════════════════════ RESULTS HISTORY ═══════════════════════
async function showResultsHistory(){
  showScreen('screen-history');
  const wrap = document.getElementById('history-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spin"></div>Loading…</div>';
  try{
    const rows = await api('/api/student/results');
    if(!rows.length){ wrap.innerHTML = '<div class="empty"><div class="ic">📊</div>No results yet. Complete a test to see it here.</div>'; return; }
    wrap.innerHTML = rows.map(r => `
      <div class="result-row">
        <div><div class="ttl">${esc(r.title)}</div><div class="dt">${new Date(r.submitted_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div></div>
        <div class="sc">${r.score}/${r.max_score}</div>
      </div>`).join('');
  }catch(e){
    wrap.innerHTML = `<div class="empty"><div class="ic">⚠️</div>${esc(e.message)}</div>`;
  }
}

// ═══════════════════════ INIT ═══════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js').catch(()=>{}); });
}
if(token && studentInfo){ goHome(); } else { showScreen('screen-login'); }
